# Manifest — cumple core/contracts/workflow-manifest.md (v1)
#
# ⚠️ Este manifest describe el TEMPLATE actual (workflow.json: genera guiones en voz del
# cliente → Sheets). El rework del MVP (ADR-009 + runbook F2, carril B3) lo cambia: config
# desde Airtable, GENERAR → transcripción literal + traducción al español, entrega a
# Airtable + Google Doc por script. El manifest se actualiza al completar el rework.
contract_version: 1

id: short-form-content
name: "Detector de referentes virales → guiones short form"
description: >
  Cada lunes detecta Reels de IG y videos de TikTok virales sobre los temas del cliente,
  los transcribe y genera guiones en la voz del cliente con Claude; registra en Google
  Sheets y envía resumen por email. Un cliente/voz por copia del workflow.
engine: n8n
status: draft                     # construido y probado como plantilla; aún no deployado (F2)
owner: mani

triggers:
  - type: cron
    schedule: "0 8 * * 1"         # lunes 8:00 AM
    timezone: America/Bogota      # confirmada 2026-06-12 — validar interpretación al activar (D1 del ROADMAP)
  - type: form                    # búsqueda bajo demanda (M2): n8n Form Trigger, página web propia
  - type: manual                  # "Execute Workflow" en n8n para corridas de prueba

inputs:
  client_config: "clients/{cliente}/short-form-content.yaml"
  filters:
    # scope=run: el default sale de la config del cliente (placeholders <<...>> en el nodo
    # "Parámetros de corrida") y el formulario lo sobreescribe SOLO para esa corrida (M1+M2).
    - { key: min_likes,        type: number, scope: run,    default: 10000,  desc: "Umbral de likes del filtro viral" }
    - { key: min_views,        type: number, scope: run,    default: 100000, desc: "Umbral de reproducciones" }
    - { key: min_seguidores,   type: number, scope: run,    default: 500000, desc: "Umbral de seguidores de la cuenta" }
    - { key: top_n,            type: number, scope: run,    default: 25,     desc: "Cuántos referentes pasan el filtro" }
    - { key: temas,            type: list,   scope: run,    desc: "Temas relevantes; default = temas del cliente (<<TEMA_1..5>>), '*' en el form = sin filtro" }
    - { key: hashtags,         type: list,   scope: run,    desc: "Filtro por hashtags sobre lo colectado (vacío = sin filtro)" }
    - { key: tipos_contenido,  type: list,   scope: run,    desc: "short (video ≤90s) | video | imagen (vacío = cualquiera)" }
    - { key: dias_recencia,    type: number, scope: run,    default: 0,      desc: "Solo contenido de los últimos N días (0 = sin límite)" }
    - { key: plataformas,      type: list,   scope: run,    desc: "instagram | tiktok (default: ambas)" }
    - { key: ig_results_limit, type: number, scope: client, default: 12,     desc: "Posts a colectar por cuenta de IG (H5)" }
    - { key: tt_results_limit, type: number, scope: client, default: 60,     desc: "Videos a colectar por hashtag de TikTok (H5)" }
    - { key: cuentas_ig,       type: list,   scope: client, desc: "Cuentas referentes de IG a scrapear" }
    - { key: hashtags_tiktok,  type: list,   scope: client, desc: "Hashtags de TikTok a scrapear (semilla de colecta, no filtro)" }
    - { key: categorias,       type: list,   scope: client, desc: "5 categorías de guion — DEBEN coincidir en el prompt de Claude y el parser" }
  credentials:
    - apify_token
    - anthropic_api_key
    - supadata_api_key
    - google_sheets_oauth       # credencial OAuth dentro de n8n
    - gmail_oauth               # credencial OAuth dentro de n8n

stages:
  colectar: "Apify — Scrape IG Reels + Scrape TikTok (volúmenes desde 'Parámetros de corrida')"
  normalizar: "Nodos 'Normalizar IG1' / 'Normalizar TT1' + Merge → formato común"
  filtrar_scorear: "Filtrar referentes virales — top N (params por corrida: umbrales, temas, hashtags, tipo, recencia, plataformas + score de ranking)"
  enriquecer: "Supadata Whisper — transcripción de audio"
  generar: "Claude — agente escritor voz cliente (prompt caching, perfil guion_reel)"
  calidad: n/a                  # hueco conocido — candidato a checklist tipo substack (post-MVP)
  entregar: "Google Sheets (pestaña del cliente, columnas fijas)"
  notificar: "Email resumen vía Gmail"

outputs:
  - type: guion_reel
    destination_native: google_sheets
    registered: pending          # se conecta al registro central en F2

runbook:
  setup: "ROADMAP carril B (hosting: ADR-005) + checklist de placeholders del README.md"
  start: "Activar el workflow en n8n (cron lunes 8 AM — validar timezone explícitamente)"
  stop: "Desactivar el workflow en n8n"
  test: "Execute Workflow manual; verificar filas en el Sheet + email resumen (+ registro desde F2)"
  docs:
    - README.md
    - CLAUDE.md

cost_per_run: "por medir en F2 (Apify x2 actors + ~25 transcripciones Supadata + ~25 llamadas Claude con prompt caching)"
