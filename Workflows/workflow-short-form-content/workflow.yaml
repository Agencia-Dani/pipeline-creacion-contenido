# Manifest — cumple core/contracts/workflow-manifest.md (v1)
#
# Estado 2026-06-16: REWORK B3 (ADR-009) + refactor de relevancia (ADR-010, Stages 1-3). Mapea el
# motor real a las 8 etapas canónicas (PLAN §2.4): config en Airtable → scrape (Apify) → pre-trim
# Haiku + heat-score métrico + dedup → transcribe/traduce (2 Code nodes) → GATE Haiku (CALIDAD) →
# candidatos a Airtable + registro en Supabase. Sin Google en el motor.
# CALIDAD ya no es hueco: la llena el Gate de relevancia (Haiku) sobre el transcript. El doble gate
# (pre-trim recall + gate precision) y el heat-score composite viven en docs/agents/refactor-relevancia.md.
contract_version: 1

id: short-form-content
name: "Motor de reels — referentes → candidatos (ADR-009)"
description: >
  Cada semana lee la config del equipo en Airtable (proyectos, voces, referentes),
  scrapea Reels de IG y videos de TikTok (Apify, solo por referentes — ADR-019), los ordena de caliente a frío con el
  heat-score v1, descarta lo ya visto (dedup en Supabase), transcribe (Supadata) y traduce
  literal al español con Claude Haiku solo si el original no está en español, y entrega los
  candidatos a la tabla Candidatos de Airtable para que el equipo de redes los califique.
  Registra cada corrida y salida en Supabase (sumidero, no dependencia).
engine: n8n
status: draft                     # corrió manual (V1); cron sin activar (D1–D3 del ROADMAP)
owner: mani

triggers:
  - type: cron
    schedule: "0 8 * * 1"         # lunes 8:00 AM (semanal — acota el gasto de Apify free)
    timezone: America/Bogota      # validar interpretación al activar (D1 del ROADMAP)
  - type: manual                  # "Execute Workflow" en n8n para corridas de prueba
  # (El Form Trigger del template viejo se eliminó: Airtable es la única superficie de config.)

inputs:
  # MVP: 1 instancia editada a mano en el nodo 'Config' de n8n (deploy.mjs quedó obsoleto;
  # multi-cliente real = F5). El patrón de ruta queda declarado para cuando exista.
  client_config: "clients/{cliente}/short-form-content.yaml"
  config_node: "Nodo 'Config' (editar tras importar): airtable_base_id, supabase_url, instance_id + pesos del heat y límites de scrape."
  airtable_cockpit: "core/contracts/airtable-cockpit.md — Proyectos/Voces/Referentes (lectura) + Candidatos (escritura)."
  # filtros calibrables. scope: client = identidad estable del cliente (hoy viven en Airtable
  # por-proyecto + en el nodo Config; ninguno se pasa por corrida porque no hay form trigger).
  filters:
    - { key: top_n,            type: number, scope: client, desc: "Candidatos por proyecto a Airtable (Proyectos.top_n)" }
    - { key: dias_recencia,    type: number, scope: client, desc: "Ventana de fetch por proyecto (backfill grande la 1ª vez)" }
    - { key: peso_views,       type: number, scope: client, default: 0.4 }
    - { key: peso_likes,       type: number, scope: client, default: 0.4 }
    - { key: peso_eng,         type: number, scope: client, default: 0.2 }
    # boost_tema salió en Stage 2 (ADR-010): lo reemplaza el juicio semántico de Haiku (pre-trim + gate).
    - { key: peso_relevancia,  type: number, scope: client, default: 0.7, desc: "Peso del juicio semántico de Haiku vs métricas en el heat-score composite (ADR-010)" }
    - { key: boost_idioma,     type: number, scope: client, default: 0.3 }
    - { key: umbral_viral,     type: number, scope: client, default: 700000 }
    - { key: ig_results_limit, type: number, scope: client, default: 8 }
    - { key: tt_results_limit, type: number, scope: client, default: 30 }
  credentials:                    # SOLO NOMBRES — los valores viven en n8n / gestor, JAMÁS en git
    - apify_token                 # placeholder <APIFY_TOKEN> / credencial apifyApi en los 2 nodos Apify
    - anthropic_api_key           # placeholder <ANTHROPIC_API_KEY> en 3 Code nodes: Pre-trim relevancia, Traducir (Claude Haiku), Gate de relevancia
    - supadata_api_key            # placeholder <SUPADATA_API_KEY> en el Code node Transcribir (Supadata)
    - airtable_token              # credencial n8n 'Airtable PAT' (airtableTokenApi)
    - supabase_service_role       # credencial n8n 'Supabase Registro' (supabaseApi)
    # NINGUNA credencial de Google.

stages:                           # las 8 etapas canónicas de PLAN §2.4 (sin vacíos; n/a si no aplica)
  colectar: "Lee la config del equipo en Airtable (Proyectos/Voces/Referentes), arma el plan, y scrapea con Apify solo por referentes (ADR-019): IG Reels (directUrls, onlyPostsNewerThan) + TikTok Perfil (profiles)."
  normalizar: "Normalizar IG/TT → formato común content_item (+ external_id) → Merge (append) → Asignar proyecto+voz (capa 2 de recencia: descarta lo más viejo que dias_recencia)."
  filtrar_scorear: "Pre-trim (Haiku LAXO sobre el caption): descarta off-topic obvio antes de transcribir usando criterios_relevancia del Proyecto/Voz (recall, fail-open). Heat-score v1 = prescore métrico 0.4·norm(views)+0.4·norm(likes)+0.2·norm(eng) ×(1+idioma)×(1+selección) + dedup contra processed_items (Supabase); viral_por_tamano marca, no corta; top_n por proyecto. (El substring `tema` salió — ADR-010.)"
  enriquecer: "Transcribir (Supadata) + Traducir (Claude Haiku) en 2 Code nodes (this.helpers.httpRequest): external_id atado al item (sin merge-by-position), lang de Supadata primario con fallback sobre el transcript. Traduce literal solo si el original no está en español. Fail-open."
  generar: "Perfil 'script literal' (ADR-009): el script es la transcripción/traducción tal cual, sin reescritura ni voz."
  calidad: "Gate de relevancia (Haiku) sobre el transcript: jurado ESTRICTO contra criterios_relevancia (Proyecto ⊕ Voz) → {relevante, score, razon}; dropea irrelevantes. heat_score final = composite peso_relevancia·semántico + (1-peso)·percentil(prescore métrico). Fail-open (ADR-010, Stage 3)."
  entregar: "Candidatos a Airtable (estado 'nuevo', batch 10/call, links proyecto/voz) + registro en Supabase (runs abrir/cerrar + outputs metadata schema 003; todo continue-on-fail, sumidero)."
  notificar: n/a                  # sin email en el MVP (el equipo vive en Airtable)

outputs:
  - type: guion_reel
    destination_native: airtable  # tabla Candidatos
    registered: yes               # reporta al registro central (Supabase outputs; contenido_o_link = texto del script — ADR-009 nota 2026-06-14)

runbook:
  setup: "Importar workflow.json en n8n → editar nodo Config (base_id, supabase_url, instance_id) → pegar API keys/credenciales (B4) → importar error-workflow-registro.json como Error Workflow."
  start: "Activar el cron en n8n (validar timezone). Para probar: Execute Workflow manual."
  stop: "Desactivar el workflow en n8n."
  test: "Corrida manual de backfill (dias_recencia alto en el proyecto provisional) → candidatos en Airtable con script en español + idioma; processed_items poblada; runs/outputs en Supabase (V1–V6)."
  docs:
    - README.md
    - CLAUDE.md
    - ../../ROADMAP.md
    - ../../docs/agents/refactor-relevancia.md

cost_per_run: "por medir (B3): Apify x2 actors + ~top_n transcripciones Supadata + solo las traducciones no-español vía Claude Haiku (claude-haiku-4-5, $1/$5 por Mtok). ADR-010 suma 2 llamadas Haiku batch (pre-trim + gate)."
