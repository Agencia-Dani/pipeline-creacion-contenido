# Manifest — cumple core/contracts/workflow-manifest.md (v1)
#
# Estado 2026-06-14: REWORK B3 hecho (ADR-009). Este manifest describe el motor nuevo:
# config desde Airtable → scrape (Apify) → heat-score v1 → dedup → transcribe (Supadata)
# → traduce literal al español SOLO si hace falta (Claude Haiku) → candidatos a Airtable
# + registro en Supabase. Sin Google (ni Docs ni Sheets ni Gmail) en el motor.
# Falta validación en vivo (V1–V6 del ROADMAP) y entregar credenciales en n8n (B4).
contract_version: 1

id: short-form-content
name: "Motor de reels — referentes → candidatos (ADR-009)"
description: >
  Cada semana lee la config del equipo en Airtable (proyectos, voces, keywords, referentes),
  scrapea Reels de IG y videos de TikTok (Apify), los ordena de caliente a frío con el
  heat-score v1, descarta lo ya visto (dedup en Supabase), transcribe (Supadata) y traduce
  literal al español con Claude Haiku solo si el original no está en español, y entrega los
  candidatos a la tabla Candidatos de Airtable para que el equipo de redes los califique.
  Registra cada corrida y salida en Supabase (sumidero, no dependencia).
engine: n8n
status: draft                     # construido; sin deployar ni validar en vivo (B4 + V1–V6)
owner: mani

triggers:
  - type: cron
    schedule: "0 8 * * 1"         # lunes 8:00 AM (semanal — acota el gasto de Apify free)
    timezone: America/Bogota      # validar interpretación al activar (D1 del ROADMAP)
  - type: manual                  # "Execute Workflow" en n8n para corridas de prueba
  # (El Form Trigger del template viejo se eliminó: Airtable es la única superficie de config.)

inputs:
  config_node: "Nodo 'Config' (editar tras importar): airtable_base_id, supabase_url, instance_id + pesos del heat y límites de scrape."
  airtable_cockpit: "core/contracts/airtable-cockpit.md — Proyectos/Voces/Keywords/Referentes (lectura) + Candidatos (escritura)."
  por_proyecto:                   # se leen de Airtable en cada corrida
    - { key: top_n,         scope: proyecto, desc: "Cuántos candidatos por proyecto entran a Airtable" }
    - { key: dias_recencia, scope: proyecto, desc: "Ventana de fetch (backfill grande la 1ª vez)" }
    - { key: min_likes,     scope: proyecto, desc: "Piso blando (hoy informativo; el heat es percentil)" }
    - { key: min_views,     scope: proyecto, desc: "Piso blando (idem)" }
  tunables:                       # nodo Config, calibrables (ROADMAP §5)
    - { key: peso_views,  default: 0.4 }
    - { key: peso_likes,  default: 0.4 }
    - { key: peso_eng,    default: 0.2 }
    - { key: boost_tema,  default: 0.5 }
    - { key: boost_idioma, default: 0.3 }
    - { key: umbral_viral, default: 700000 }
    - { key: ig_results_limit, default: 8 }
    - { key: tt_results_limit, default: 30 }
  credentials:                    # TODAS en credenciales de n8n / gestor — JAMÁS en git
    - apify_token                 # placeholder <APIFY_TOKEN> en los 2 nodos Apify
    - anthropic_api_key           # placeholder <ANTHROPIC_API_KEY> en el nodo Claude Haiku
    - supadata_api_key            # placeholder <SUPADATA_API_KEY> en el nodo Supadata
    - airtable_token              # credencial n8n 'Airtable PAT' (airtableTokenApi)
    - supabase_service_role       # credencial n8n 'Supabase Registro' (supabaseApi)
    # NINGUNA credencial de Google.

stages:
  config: "Lee Proyectos/Voces/Keywords/Referentes de Airtable y arma el plan de corrida (targets IG + hashtags TT, map a proyecto/voz)."
  colectar: "Apify — IG Reels (directUrls de referentes) + TikTok (hashtags de keywords). 2 corridas por ejecución."
  normalizar: "Normalizar IG/TT → formato común (+ external_id para el dedup) → Merge (append) → Asignar proyecto+voz."
  scorear: "Heat-score v1 = 0.4·norm(views)+0.4·norm(likes)+0.2·norm(eng) ×(1+tema)×(1+idioma)×(1+selección); flag_viral marca; top_n por proyecto."
  dedup: "Consulta processed_items (Supabase) y descarta lo ya visto antes de top_n; inserta los top_n (Prefer ignore-duplicates)."
  transcribir: "Supadata transcribe (batch). Idioma detectado del response."
  traducir: "IF idioma=es → script = transcripción tal cual; si no → Claude Haiku traduce literal (sin reescribir)."
  entregar: "Candidatos a Airtable (estado 'nuevo', batch 10/call, links proyecto/voz)."
  registrar: "Supabase: runs (abrir/cerrar) + outputs (metadata schema 003). Todo continue-on-fail (sumidero)."
  calidad: n/a                    # hueco conocido (post-MVP)
  notificar: n/a                  # sin email en el MVP (el equipo vive en Airtable)

outputs:
  - type: guion_reel
    destination_native: airtable  # tabla Candidatos
    registered: supabase          # outputs (contenido_o_link = texto del script; sin link_doc — ver ADR-009 nota 2026-06-14)

runbook:
  setup: "Importar workflow.json en n8n → editar nodo Config (base_id, supabase_url, instance_id) → pegar API keys/credenciales (B4) → importar error-workflow-registro.json como Error Workflow."
  start: "Activar el cron en n8n (validar timezone). Para probar: Execute Workflow manual."
  stop: "Desactivar el workflow en n8n."
  test: "Corrida manual de backfill (dias_recencia alto en el proyecto provisional) → candidatos en Airtable con script en español + idioma; processed_items poblada; runs/outputs en Supabase (V1–V6)."
  docs:
    - README.md
    - CLAUDE.md
    - ../../ROADMAP.md

cost_per_run: "por medir (B3): Apify x2 actors + ~top_n transcripciones Supadata + solo las traducciones no-español vía Claude Haiku (claude-haiku-4-5, $1/$5 por Mtok)."
